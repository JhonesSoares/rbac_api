services:
  db:
    container_name: rbac_db
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rbac_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rbac_api
    restart: unless-stopped

    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./app:/app/app:ro
      - ./frontend:/app/frontend:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
    networks:
      - rbac_network

    depends_on:
      db:
        condition: service_healthy # Aguarda o banco ficar pronto

  redis: # <--- ESSE NOME DEVE SER EXATAMENTE "redis"
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - rbac_network

volumes:
  postgres_data:
    driver: local
networks:
  rbac_network:
    driver: bridge
